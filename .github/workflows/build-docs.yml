name: Build Docs

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

jobs:
  build-pdf:
    name: Build and commit PDFs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build PDFs
        run: |
          python scripts/build_interview_pdf.py
          python scripts/convert_resume_to_pdf.py cv/Nikita_Selin_Resume.md
          python scripts/convert_resume_to_pdf.py cv/Nikita_Selin_Resume_EN.md

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.pdf
          if git diff --staged --quiet; then
            echo "PDFs are up to date, nothing to commit"
          else
            git commit -m "docs: rebuild PDFs"
            git push
          fi
